<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Parkomatów</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#e5e7eb;}
header{height:60px;background:#020617;color:white;display:flex;align-items:center;justify-content:center;position:relative;}
#alarmCounter{position:absolute;right:15px;background:#dc2626;padding:4px 10px;border-radius:20px;}

.main{position:fixed;top:60px;bottom:60px;left:0;right:0;overflow:hidden;}
.section{position:absolute;inset:0;display:none;overflow:auto;}
.section.active{display:block;}

#map{width:100%;height:100%;}

.bottom-nav{
  position:fixed;bottom:0;height:60px;width:100%;
  display:flex;background:#020617;border-top:1px solid #1f2937;
}
.bottom-nav button{
  flex:1;border:none;background:none;color:#e5e7eb;
  font-weight:600;font-size:14px;
}

.filter-bar{
  padding:10px;
  background:#020617;
  border-bottom:1px solid #1f2937;
  display:flex;gap:10px;flex-wrap:wrap;
}

select,input{
  padding:6px;
  border-radius:6px;
  border:1px solid #374151;
  background:#0b1220;
  color:white;
}

.terminal-box{
  background:#0b1220;
  margin:12px;
  padding:12px;
  border-radius:10px;
  border:1px solid #1f2937;
}

#locateBtn{
  position:fixed;
  right:15px;
  bottom:90px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:#2563eb;
  color:white;
  border:none;
  font-size:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header>
Monitoring Parkomatów
<div id="alarmCounter">0</div>
</header>

<div class="main">

<!-- MAPA -->
<div id="mapSection" class="section active">
  <div class="filter-bar">
    <select id="nodeFilter" onchange="renderAll()">
      <option value="">Wszystkie strefy</option>
    </select>
  </div>
  <div id="map"></div>
</div>

<!-- AWARIE -->
<div id="awarieSection" class="section">
  <div class="filter-bar">
    <input type="date" id="activeDateFrom" onchange="renderActiveList()">
    <input type="date" id="activeDateTo" onchange="renderActiveList()">
    <input type="text" id="activeTerminalFilter" placeholder="Nr parkomatu" oninput="renderActiveList()">
    <select id="activeEventFilter" onchange="renderActiveList()">
      <option value="">Wszystkie awarie</option>
    </select>
  </div>
  <div id="awarieList"></div>
</div>

<!-- HISTORIA -->
<div id="historiaSection" class="section">
  <div class="filter-bar">
    <input type="date" id="historyDateFrom" onchange="renderHistoryList()">
    <input type="date" id="historyDateTo" onchange="renderHistoryList()">
    <input type="text" id="historyTerminalFilter" oninput="renderHistoryList()" placeholder="Nr parkomatu">
    <select id="historyEventFilter" onchange="renderHistoryList()">
      <option value="">Wszystkie awarie</option>
    </select>
  </div>
  <div id="historiaList"></div>
</div>

</div>

<div class="bottom-nav">
  <button onclick="showSection('mapSection')">MAPA</button>
  <button onclick="showSection('awarieSection')">AWARIE</button>
  <button onclick="showSection('historiaSection')">HISTORIA</button>
</div>

<button id="locateBtn">📍</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ===== GOOGLE SHEETS ===== */
const PARKOMATY_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vReREVijVR33ZVud78Iv_oHBEkmDRkQxRxL97KN8gIbs9u5YPtVtvYsaQmHxrf7JWz_pQ_KdCaixonO/pub?output=csv";
const ACTIVE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=0&single=true&output=csv";
const HISTORY_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=1220391858&single=true&output=csv";

/* ===== MAPA (DARK APP STYLE) ===== */
let map = L.map('map').setView([52.2297,21.0122],12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let markerLayer = L.layerGroup().addTo(map);

/* ===== DANE ===== */
let allParkomaty={};
let activeEvents={};
let historyEvents=[];

/* ===== CSV ===== */
function parseCSV(text){
  return text.replace(/^\uFEFF/,"")
    .split("\n")
    .filter(l=>l.trim())
    .map(l=>l.split(",").map(v=>v.replace(/"/g,"")));
}

/* ===== LOAD PARKOMATY ===== */
async function loadParkomaty(){
  const rows=parseCSV(await (await fetch(PARKOMATY_URL)).text()).slice(1);

  const nodeSet=new Set();

  rows.forEach(r=>{
    const id=r[0]?.trim();
    const lng=parseFloat(r[2]);
    const lat=parseFloat(r[3]);
    const node=r[4]?.trim();

    if(!id || isNaN(lat) || isNaN(lng)) return;

    allParkomaty[id]={lat,lng,location:r[1],node};
    nodeSet.add(node);
  });

  const sel=document.getElementById("nodeFilter");
  sel.innerHTML=`<option value="">Wszystkie strefy</option>`+
    [...nodeSet].sort().map(n=>`<option value="${n}">${n}</option>`).join('');
}

/* ===== LOAD ACTIVE ===== */
async function loadActive(){
  const rows=parseCSV(await (await fetch(ACTIVE_URL)).text()).slice(1);

  activeEvents={};
  let count=0;

  rows.forEach(r=>{
    const id=r[0]?.trim();
    if(!id) return;

    if(!activeEvents[id]) activeEvents[id]=[];
    activeEvents[id].push({name:r[4],hardware:r[6]||"",date:r[3]});
    count++;
  });

  document.getElementById("alarmCounter").innerText=count;
}

/* ===== LOAD HISTORY ===== */
async function loadHistory(){
  historyEvents=parseCSV(await (await fetch(HISTORY_URL)).text()).slice(1);
}

/* ===== MARKER ICON ===== */
function color(events){
  if(events.some(e=>e.name.toLowerCase().includes("offline"))) return "#dc2626";
  if(events.some(e=>e.name.toLowerCase().includes("papier"))) return "#f59e0b";
  return "#3b82f6";
}

function icon(events){
  return L.divIcon({
    className:"",
    html:`<div style="width:16px;height:16px;border-radius:50%;
    background:${color(events)};border:3px solid white;
    box-shadow:0 0 10px rgba(0,0,0,0.7)"></div>`
  });
}

/* ===== RENDER MAPA + AUTO ZOOM ===== */
function renderMarkers(){

  const node=document.getElementById("nodeFilter").value;
  markerLayer.clearLayers();

  let pts=[];

  Object.keys(activeEvents).forEach(id=>{
    const p=allParkomaty[id];
    if(!p) return;
    if(node && p.node!==node) return;

    let popup=`<b>${id}</b><br>${p.location}<br><br>`;

    activeEvents[id].forEach(e=>{
      popup+=`• ${e.name}<br><small>${e.date}</small><br>`;
    });

    L.marker([p.lat,p.lng],{icon:icon(activeEvents[id])})
      .bindPopup(popup)
      .addTo(markerLayer);

    pts.push([p.lat,p.lng]);
  });

  if(pts.length===0){
    map.setView([52.2297,21.0122],6);
    return;
  }

  if(pts.length===1){
    map.setView(pts[0],15);
    return;
  }

  map.fitBounds(L.latLngBounds(pts),{padding:[50,50],maxZoom:16});
}

/* ===== UI ===== */
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="mapSection") setTimeout(()=>map.invalidateSize(),200);
}

function renderAll(){
  renderMarkers();
}

/* ===== INIT ===== */
async function init(){
  await loadParkomaty();
  await loadActive();
  await loadHistory();
  renderAll();
}

init();

/* GPS */
document.getElementById("locateBtn").onclick=()=>{
  map.locate({setView:true,maxZoom:16});
};

</script>

</body>
</html>
