<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Parkomatów</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
header{height:60px;background:#1e293b;color:white;display:flex;align-items:center;justify-content:center;position:relative;}
#alarmCounter{position:absolute;right:15px;background:red;padding:4px 10px;border-radius:20px;}

.main{position:fixed;top:60px;bottom:60px;left:0;right:0;overflow:hidden;}
.section{position:absolute;inset:0;display:none;overflow:auto;padding-bottom:20px;}
.section.active{display:block;}

#map { width:100%; height:100%; }

.bottom-nav{position:fixed;bottom:0;height:60px;width:100%;display:flex;background:white;border-top:1px solid #ccc;}
.bottom-nav button{flex:1;border:none;background:white;font-size:15px;font-weight:600;}

.filter-bar{
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select,input{
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
}

.terminal-box{
  background:white;
  margin:12px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.leaflet-popup-content{
  width:280px !important;
  word-break:break-word;
}
</style>
</head>

<body>

<header>
Monitoring Parkomatów
<div id="alarmCounter">0</div>
</header>

<div class="main">

  <!-- MAPA -->
  <div id="mapSection" class="section active">
    <div class="filter-bar">
      <select id="nodeFilter" onchange="renderAll()">
        <option value="">Wszystkie strefy</option>
      </select>
    </div>
    <div id="map" style="height:calc(100% - 60px)"></div>
  </div>

  <!-- AWARIE -->
  <div id="awarieSection" class="section">
    <div class="filter-bar">
      <input type="date" id="activeDateFrom" onchange="renderActiveList()">
<input type="date" id="activeDateTo" onchange="renderActiveList()">

<input type="text" id="activeTerminalFilter" placeholder="Nr parkomatu"
oninput="renderActiveList()">

<select id="activeEventFilter" onchange="renderActiveList()">
<option value="">Wszystkie awarie</option>
</select>
    </div>
    <div id="awarieList"></div>
  </div>

  <!-- HISTORIA -->
  <div id="historiaSection" class="section">
    <div class="filter-bar">
      <input type="date" id="historyDateFrom" onchange="renderHistoryList()">
<input type="date" id="historyDateTo" onchange="renderHistoryList()">

<input type="text" id="historyTerminalFilter" placeholder="Nr parkomatu"
oninput="renderHistoryList()">

<select id="historyEventFilter" onchange="renderHistoryList()">
<option value="">Wszystkie awarie</option>
</select>
    </div>
    <div id="historiaList"></div>
  </div>

</div>

<div class="bottom-nav">
  <button onclick="showSection('mapSection')">MAPA</button>
  <button onclick="showSection('awarieSection')">AWARIE</button>
  <button onclick="showSection('historiaSection')">HISTORIA</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ===== LINKI CSV ===== */
const PARKOMATY_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vReREVijVR33ZVud78Iv_oHBEkmDRkQxRxL97KN8gIbs9u5YPtVtvYsaQmHxrf7JWz_pQ_KdCaixonO/pub?output=csv";
const ACTIVE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=0&single=true&output=csv";
const HISTORY_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=1220391858&single=true&output=csv";

/* ===== MAPA ===== */
let map = L.map('map').setView([52.2297,21.0122],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markerLayer = L.layerGroup().addTo(map);

/* ===== DANE ===== */
let allParkomaty={};
let activeEvents={};
let historyEvents=[];

/* ===== PRZEŁĄCZANIE ===== */
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="mapSection"){ setTimeout(()=>map.invalidateSize(),200); }
}

/* ===== CSV PARSER ===== */
function parseCSV(text){
  const rows=[];
  const lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
  for(let line of lines){
    if(!line.trim()) continue;
    rows.push(line.split(",").map(v=>v.replace(/^"|"$/g,"")));
  }
  return rows;
}

// Zmienna globalna do przechowywania Node
let allNodes = [];

async function loadParkomaty(){
  const res = await fetch(PARKOMATY_URL);
  const text = await res.text();
  const rows = parseCSV(text).slice(1);

  const nodeSet = new Set();  // zbiór unikalnych Node

  rows.forEach(r => {
    if(r.length < 5) return;
    const id = r[0].trim();
    const lng = parseFloat(r[2]);
    const lat = parseFloat(r[3]);
    const node = r[4].trim();
    if(!id || isNaN(lat) || isNaN(lng)) return;

    allParkomaty[id] = { lat, lng, location: r[1], node };
    nodeSet.add(node);
  });

  // Tworzymy posortowaną alfabetycznie listę Node
  allNodes = Array.from(nodeSet).sort();

  // Wstawiamy opcje do istniejącego selecta w HTML
  const nodeSelect = document.getElementById("nodeFilter");
  if(nodeSelect){
    nodeSelect.innerHTML = `<option value="">Wszystkie strefy</option>` +
      allNodes.map(n => `<option value="${n}">${n}</option>`).join('');
  }
}

/* ===== AKTYWNE ===== */
async function loadActive(){
  const res=await fetch(ACTIVE_URL);
  const rows=parseCSV(await res.text()).slice(1);

  activeEvents={};
  let count=0;

  rows.forEach(r=>{
    if(!r[0]) return;
    const id=r[0].trim();
    if(!activeEvents[id]) activeEvents[id]=[];
    activeEvents[id].push({name:r[4],hardware:r[6]||"",date:r[3]});
    count++;
  });

  document.getElementById("alarmCounter").innerText=count;
}

/* ===== HISTORIA ===== */
async function loadHistory(){
  const res=await fetch(HISTORY_URL);
  historyEvents=parseCSV(await res.text()).slice(1);
}

/* ===== RENDER MAPA ===== */
function renderMarkers(){

  const nodeFilter = document.getElementById("nodeFilter").value;

  markerLayer.clearLayers();   // czyścimy tylko warstwę, nie mapę

  Object.keys(activeEvents).forEach(id=>{
    const p = allParkomaty[id];
    if(!p) return;
    if(nodeFilter && p.node !== nodeFilter) return;

    let popup = `<b>Parkomat ${id}</b><br>${p.location}<br><br>`;

    activeEvents[id].forEach(e=>{
      popup += `• ${e.name} (${e.hardware})<br>
                <small>${e.date}</small><br>`;
    });

    popup += `<br>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}"
         target="_blank"
         style="background:#16a34a;color:white;padding:6px 10px;border-radius:6px;text-decoration:none;">
         🧭 Nawiguj
      </a>`;

    L.marker([p.lat, p.lng])
      .bindPopup(popup)
      .addTo(markerLayer);
  });
}

function populateActiveEventFilter(){

  const set = new Set();

  Object.values(activeEvents).forEach(arr=>{
    arr.forEach(e=>{
      if(e.name) set.add(e.name);
    });
  });

  const select = document.getElementById("activeEventFilter");

  select.innerHTML = `<option value="">Wszystkie awarie</option>` +
    Array.from(set).sort().map(e=>`<option value="${e}">${e}</option>`).join('');
}
  
/* ===== RENDER AWARIE ===== */
function renderActiveList(){

  const dateFrom = document.getElementById("activeDateFrom").value;
  const dateTo = document.getElementById("activeDateTo").value;
  const terminalFilter = document.getElementById("activeTerminalFilter").value.trim();
  const eventFilter = document.getElementById("activeEventFilter").value;

  const from = dateFrom ? new Date(dateFrom) : null;
  const to = dateTo ? new Date(dateTo) : null;

  let html = "";

  Object.keys(activeEvents).forEach(id=>{
    const p = allParkomaty[id];
    if(!p) return;

    const filteredEvents = activeEvents[id].filter(e=>{
      const eventDate = new Date(e.date);

      if(from && eventDate < from) return false;
      if(to && eventDate > to) return false;
      if(terminalFilter && !id.includes(terminalFilter)) return false;
      if(eventFilter && e.name !== eventFilter) return false;

      return true;
    });

    if(filteredEvents.length === 0) return;

    html += `<div class="terminal-box"><b>Parkomat ${id}</b><br>${p.location}<br><br>`;

    filteredEvents.forEach(e=>{
      html += `• ${e.name} (${e.hardware})<br><small>${e.date}</small><br>`;
    });

    html += `<br>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}"
         target="_blank"
         style="background:#16a34a;color:white;padding:6px 10px;border-radius:6px;text-decoration:none;">
         🧭 Nawiguj
      </a></div>`;
  });

  document.getElementById("awarieList").innerHTML = html;
}

function populateEventFilter(){

  const set = new Set();

  historyEvents.forEach(r=>{
    if(r[4]) set.add(r[4]);
  });

  const select=document.getElementById("historyEventFilter");

  select.innerHTML=
    `<option value="">Wszystkie awarie</option>` +
    Array.from(set).sort().map(e =>
      `<option value="${e}">${e}</option>`
    ).join('');
}
      
/* ===== RENDER HISTORIA ===== */
function renderHistoryList(){

  const dateFrom=document.getElementById("historyDateFrom").value;
  const dateTo=document.getElementById("historyDateTo").value;
  const terminalFilter=document.getElementById("historyTerminalFilter").value.trim();
  const eventFilter=document.getElementById("historyEventFilter").value;

  const from=dateFrom ? new Date(dateFrom) : null;
  const to=dateTo ? new Date(dateTo) : null;

  let html="";

  historyEvents
    .sort((a,b)=> new Date(b[3]) - new Date(a[3]))
    .forEach(r=>{

      if(!r[0]) return;

      const eventDate=new Date(r[3]);

      if(from && eventDate < from) return;
      if(to && eventDate > to) return;

      if(terminalFilter && !r[0].includes(terminalFilter)) return;

      if(eventFilter && r[4] !== eventFilter) return;

      html+=`<div class="terminal-box">
        <b>Parkomat ${r[0]}</b><br>
        ${r[4]} (${r[6]||""})<br>
        Od: ${r[3]}<br>
        Do: ${r[7]||""}
      </div>`;
    });

  document.getElementById("historiaList").innerHTML=html;
}

function renderAll(){
  renderMarkers();
  renderActiveList();
  renderHistoryList();
}

/* ===== INIT ===== */
async function init(){
  await loadParkomaty();
  await loadActive();
  await loadHistory();

  populateActiveEventFilter();
  populateEventFilter();

  renderAll();
}

init();

</script>

</body>
</html>
