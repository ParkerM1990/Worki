
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Parkomatów</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#e5e7eb;
}
:root{
  --header-h: 60px;
  --sidebar-w: 72px;
  --bottom-bar: 70px;
}

header{
  height:60px;
  background:#020617;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;

  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:3000;
}
.sidebar{
  position:fixed;
  top:60px;
  left:0;
  bottom:0;
  width:72px;
  background:#020617;
  border-right:1px solid #1f2937;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:12px;
  gap:10px;
  z-index:2500;
}

.nav-btn{
  width:56px;
  height:56px;
  border:none;
  border-radius:14px;
  background:transparent;
  color:#e5e7eb;
  font-size:20px;
  cursor:pointer;
  transition:0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.nav-btn span{
  display:none;
}

.nav-btn:hover{
  background:#111827;
}

.nav-btn.active{
  background:#1d4ed8;
}

/* MOBILE */

@media(max-width:768px){

  .sidebar{
    width:100%;
    height:70px;
    top:auto;
    bottom:0;
    flex-direction:row;
    justify-content:space-around;
    border-right:none;
    border-top:1px solid #1f2937;
    padding-top:0;
    padding-bottom:env(safe-area-inset-bottom);
  }

  .main{
  left:0 !important;
  bottom:var(--bottom-bar);
}

  .nav-btn{
    width:60px;
    height:60px;
  }
}
.header-left{
  font-weight:600;
}

.header-right{
  display:flex;
  align-items:center;
  gap:8px;
}



#alarmCounter{
  background:#dc2626;
  padding:4px 10px;
  border-radius:20px;
}


.main{
  position:fixed;
  top:var(--header-h);
  left:var(--sidebar-w);
  right:0;
  bottom:0;
  overflow:auto;
}

.section{
  position:relative;
  inset:0;
  display:none;
  overflow:visible;
  box-sizing:border-box;
  padding:16px;  
  padding-bottom: calc(var(--bottom-bar) + env(safe-area-inset-bottom) + 20px);
}

.section.active{
  display:block;
}

/* 🔘 przycisk */

.filter-toggle{
  background:#020617;
  color:white;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:8px 10px;
  font-size:14px;
}


/* 📦 panel */
.map-filter-panel{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  background:#020617;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:10px;
  display:grid;
  gap:10px;

  /* ✅ animacja */
  max-height:0;
  overflow:hidden;
  opacity:0;
  transform:translateY(-10px);
  transition:0.3s ease;
  z-index:1000;
}

/* ✅ stan otwarty */
.map-filter-panel.open{
  max-height:200px;
  opacity:1;
  transform:translateY(0)
}

#map{
  position:absolute;
  z-index:0;
  top:0;
  left:0;
  right:0;
  bottom:0;
}

/* ✅ NOWY MOBILNY PANEL FILTRÓW */
.filter-bar.mobile{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr))
  gap:8px;
  padding:10px;
  background:#020617;
  border-bottom:1px solid #1f2937;
  position:sticky;
  top:0;
  z-index:10;
}

.filter-item{
  display:flex;
  align-items:center;
  background:#020617;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:6px 8px;
}

.map-filter-wrapper{
  position:relative;
}

.filter-item span{
  font-size:14px;
  margin-right:6px;
}

.filter-item input{
  flex:1;
  background:transparent;
  border:none;
  color:white;
  font-size:14px;
  outline:none;
}

/* ✅ SELECT musi mieć tło */
.filter-item select{
  flex:1;
  background:#020617;   /* 🔥 KLUCZOWE */
  border:none;
  color:white;
  font-size:14px;
  outline:none;
}

select,input{
  font-size:14px;
}

.terminal-box{
  background:#0b1220;
  margin:12px;
  padding:12px;
  border-radius:10px;
  border:1px solid #1f2937;
}

.leaflet-popup-content{
  width:280px !important;
  word-break:break-word;
}

#devicesSection{
  padding-top: 0;
}
  
#awarieSection,
#historiaSection{
  padding-top: 0;
}

#awarieSection .filter-bar,
#historiaSection .filter-bar{
  top: 0;
}
/* ✅ pełne wymuszenie stylu date */
input[type="date"] {
  color: #ffffff !important;
  background: #020617 !important;
  border: 1px solid #1f2937;
  border-radius: 8px;
  padding: 3px 6px;
}

/* ✅ tekst w środku */
input[type="date"]::-webkit-datetime-edit,
input[type="date"]::-webkit-datetime-edit-text,
input[type="date"]::-webkit-datetime-edit-day-field,
input[type="date"]::-webkit-datetime-edit-month-field,
input[type="date"]::-webkit-datetime-edit-year-field {
  color: #ffffff !important;
}

/* ✅ ikona kalendarza */
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  opacity: 1;
}

/* ✅ VERY IMPORTANT – mobile fix */
input[type="date"] {
  color-scheme: dark;
}
  /* ✅ FIX białego dropdowna na desktopie */
  select {  background-color: #020617;  color: white;}
  
#awarieSection .filter-bar,
#historiaSection .filter-bar{
  position: sticky;
  top: 0;
  z-index: 1000;
}
  
.event-name{
  word-break: break-word;
  overflow-wrap: break-word;
}

#mapSection{  position:absolute;  inset:0;  overflow:hidden;}
</style>
</head>

<body>


<header>

  <div class="header-left">
    Monitoring Parkomatów
  </div>

  <div class="header-right">
    <button class="filter-toggle" onclick="toggleFilters()">
      ⚙️
    </button>
    <div id="alarmCounter" onclick="showStats()" style="cursor:pointer;">0
  </div>
</header>
<!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

  <button class="nav-btn active"
    title="Mapa"
          onclick="setActiveNav(this);showSection('mapSection')">
    🗺️ <span>Mapa</span>
  </button>

  <button class="nav-btn"
    title="Awarie"
          onclick="setActiveNav(this);showSection('awarieSection')">
    ⚠️ <span>Awarie</span>
  </button>

  <button class="nav-btn"
    title="Historia"
          onclick="setActiveNav(this);showSection('historiaSection')">
    📜 <span>Historia</span>
  </button>
<button class="nav-btn"
        title="Urządzenia"
        onclick="setActiveNav(this);showSection('devicesSection')">
  🖥️ <span>Urządzenia</span>
</button>
    
</div>
<div class="main">

<!-- MAPA -->
<div id="mapSection" class="section active">
  
<div class="map-filter-wrapper">
  <div id="mapFilterPanel" class="map-filter-panel">

    <div class="filter-item">
      <span>📍</span>
      <select id="nodeFilter" onchange="renderAll()">
        <option value="">Wszystkie strefy</option>
      </select>
    </div>

  </div>

</div>

  <div id="map"></div>
</div>

<!-- AWARIE -->
<div id="awarieSection" class="section">

  <div class="filter-bar mobile">

 <div class="filter-item">
  <span>📍</span>
  <select id="activeNodeFilter" onchange="renderActiveList()">
    <option value="">Wszystkie strefy</option>
  </select>
</div>
    
<div class="filter-item">
  <span>📅</span>
  <input 
    type="text" 
    placeholder="Data od"
    id="activeDateFrom"
    onchange="renderActiveList()"
    onfocus="this.type='date'"
    onblur="if(!this.value)this.type='text'">
</div>




    <div class="filter-item">
      <span>➡️</span>   
<input 
  type="text" 
  placeholder="Data do"
  id="activeDateTo"
  onchange="renderActiveList()"
  onfocus="this.type='date'"
  onblur="if(!this.value)this.type='text'">
    </div>

    <div class="filter-item">
      <span>🔎</span>
      <input type="text" id="activeTerminalFilter" placeholder="Nr parkomatu" oninput="renderActiveList()">
    </div>

    <div class="filter-item">
      <span>⚠️</span>
      <select id="activeEventFilter" onchange="renderActiveList()"></select>
    </div>

  </div>

  <div id="awarieList"></div>
</div>

<!-- HISTORIA -->
<div id="historiaSection" class="section">

  <div class="filter-bar mobile">
<div class="filter-item">
  <span>📍</span>
  <select id="historyNodeFilter" onchange="renderHistoryList()">
    <option value="">Wszystkie strefy</option>
  </select>
</div>
    
    <div class="filter-item">
      <span>📅</span>
      <input type="text" 
  placeholder="Data od"
        id="historyDateFrom" onchange="renderHistoryList()"onfocus="this.type='date'"
  onblur="if(!this.value)this.type='text'">
    </div>
    
 <div class="filter-item">
      <span>➡️</span>
      <input type="text" 
  placeholder="Data do" id="historyDateTo" onchange="renderHistoryList()"
        onfocus="this.type='date'"
  onblur="if(!this.value)this.type='text'">
    </div>
    
    <div class="filter-item">
      <span>🔎</span>
      <input type="text" id="historyTerminalFilter" placeholder="Nr parkomatu" oninput="renderHistoryList()">
    </div>

    <div class="filter-item">
      <span>📜</span>
      <select id="historyEventFilter" onchange="renderHistoryList()"></select>
    </div>

  </div>

  <div id="historiaList"></div>
</div>


<!-- URZĄDZENIA -->
<div id="devicesSection" class="section">

  <div class="filter-bar mobile">

<div class="filter-item">
  <span>📍</span>
  <select id="deviceNodeFilter" onchange="renderDevicesList()">
    <option value="">Wszystkie strefy</option>
  </select>
</div>

    <div class="filter-item" style="grid-column:1 / -1;">
      <span>🔎</span>
      <input
        type="text"
        id="deviceSearch"
        placeholder="Szukaj numeru lub adresu..."
        oninput="renderDevicesList()">
    </div>

  </div>

  <div id="devicesList"></div>
</div>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ✅ JS zostaje praktycznie bez zmian -->
<script>

function makeKey(id, structure) {
  return `${id}|${(structure || "").trim().toUpperCase()}`;
}

function toggleFilters(){
  const panel = document.getElementById("mapFilterPanel");
  panel.classList.toggle("open");
}

/* ===== SHEETS ===== */
const PARKOMATY_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vReREVijVR33ZVud78Iv_oHBEkmDRkQxRxL97KN8gIbs9u5YPtVtvYsaQmHxrf7JWz_pQ_KdCaixonO/pub?gid=0&single=true&output=csv";
const ACTIVE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=0&single=true&output=csv";
const HISTORY_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=1220391858&single=true&output=csv";

/* ===== MAPA ===== */
let map = L.map('map').setView([52.23218280963405, 21.007884183479632],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
let markerLayer = L.layerGroup().addTo(map);

/* ===== DATA ===== */
let allParkomaty={};
let activeEvents={};
let historyEvents=[];
const RED_CODES = ["16384","16385","16386","16900"];
/* ===== CSV ===== */
function parseCSV(text){
  const rows=[];
  const lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
  for(let line of lines){
    if(!line.trim()) continue;
    rows.push(line.split(",").map(v=>v.replace(/^"|"$/g,"")));
  }
  return rows;
}


/* ===== LOAD PARKOMATY ===== */
async function loadParkomaty(){

  const rows = parseCSV(await (await fetch(PARKOMATY_URL)).text()).slice(1);

  const nodeSet = new Set();

  rows.forEach(r => {

    const id = r[0]?.trim(); 
    const lng = parseFloat(r[2]);
    const lat = parseFloat(r[3]);
    const structure = r[5]?.trim();
    const node = r[4];

    if(!id || !structure || isNaN(lat) || isNaN(lng)) return;

    const key = makeKey(id, structure);

    allParkomaty[key] = {
      id,
      structure,
      lat,
      lng,
      location: r[1],
      node
    };

    nodeSet.add(node);
  });

  // ✅ wspólna lista stref
  const nodes = [...nodeSet].sort();

  const options =
    `<option value="">Wszystkie strefy</option>` +
    nodes.map(n => `<option value="${n}">${n}</option>`).join('');

  // ✅ MAPA
  document.getElementById("nodeFilter").innerHTML = options;

  // ✅ AWARIE
  const activeNode = document.getElementById("activeNodeFilter");
  if(activeNode) activeNode.innerHTML = options;

  // ✅ HISTORIA
  const historyNode = document.getElementById("historyNodeFilter");
  if(historyNode) historyNode.innerHTML = options;

  // ✅ URZĄDZENIA
  const deviceNode = document.getElementById("deviceNodeFilter");
  if(deviceNode) deviceNode.innerHTML = options;
}

/* ===== LOAD ACTIVE ===== */
async function loadActive(){
  const rows=parseCSV(await (await fetch(ACTIVE_URL)).text()).slice(1);

  activeEvents={};
  let count=0;

 
rows.forEach(r=>{
  const id = r[0]?.trim();
const structure = r[1]?.trim();

const key = makeKey(id, structure);
if (!allParkomaty[key]) return;

if (!activeEvents[key]) activeEvents[key] = [];

activeEvents[key].push({
  name: r[5],
  code: r[4],
  hardware: r[7] || "",
  date: r[3]
});
    count++;
  });

  document.getElementById("alarmCounter").innerText=count;
}

/* ===== LOAD HISTORY ===== */
async function loadHistory(){
  historyEvents=parseCSV(await (await fetch(HISTORY_URL)).text()).slice(1);
}

/* ===== UI ===== */
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="mapSection") setTimeout(()=>map.invalidateSize(),200);
}
function setActiveNav(btn){

  document
    .querySelectorAll(".nav-btn")
    .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");
}
/* ===== MAP + AUTO CENTER ===== */
function renderMarkers(){

  const node=document.getElementById("nodeFilter").value;
  markerLayer.clearLayers();

  let points=[];

 

Object.keys(activeEvents).forEach(key => {

  const p = allParkomaty[key];
  if(!p) return;

  if(node && p.node!==node) return;

  let popup = `<b>Parkomat ${p.id}</b><br>${p.location}<br><br>`;

  

activeEvents[key].forEach(e=>{
  popup+=`
    • <b>${e.hardware || "Inne"}</b> – ${e.name}<br>
    <small>${e.date}</small><br>
  `;

  });

  popup+=`
    <br>
    <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}"
       target="_blank"
       style="background:#16a34a;color:white;padding:6px 10px;border-radius:6px;text-decoration:none;">
       🧭 Nawiguj
    </a>
  `;

  // ✅ 👉 DODAJ TO TU
  const codes = activeEvents[key].map(e => (e.code ? String(e.code).trim() : ""));
  const hasCritical = codes.some(code => RED_CODES.includes(code));

  // ✅ marker
  const icon = L.divIcon({
    className: '',
    html: `
      <div style="
        width:22px;
        height:22px;
        border-radius:50%;
        background:${hasCritical ? '#dc2626' : '#16a34a'};
        border:2px solid white;
        box-shadow:0 0 8px rgba(0,0,0,0.6);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:12px;
        color:white;
        font-weight:bold;
      ">
        ${activeEvents[key].length}
      </div>
    `
  });

  L.marker([p.lat,p.lng], { icon })
    .bindPopup(popup)
    .addTo(markerLayer);

  points.push([p.lat,p.lng]);
});


  if(points.length===0){
    map.setView([52.2297,21.0122],6);
  }
  else if(points.length===1){
    map.setView(points[0],15);
  }
  else{
    map.fitBounds(L.latLngBounds(points),{
      padding:[50,50],
      maxZoom:16
    });
  }
}

/* ===== FILTR AWARII (RESTORED) ===== */
function populateActiveEventFilter(){

  const set=new Set();

  Object.values(activeEvents).forEach(arr=>{
    arr.forEach(e=>{
      if(e.name) set.add(e.name);
    });
  });

  document.getElementById("activeEventFilter").innerHTML=
    `<option value="">Wszystkie awarie</option>`+
    [...set].sort().map(e=>`<option value="${e}">${e}</option>`).join('');
}

/* ===== FILTR HISTORII (RESTORED) ===== */
function populateEventFilter(){

  const set=new Set();

  historyEvents.forEach(r=>{
    if(r[5]) set.add(r[5]);
  });

  document.getElementById("historyEventFilter").innerHTML=
    `<option value="">Wszystkie awarie</option>`+
    [...set].sort().map(e=>`<option value="${e}">${e}</option>`).join('');
}

/* ===== AWARIE ===== */
function renderActiveList(){

  const node = document.getElementById("activeNodeFilter").value;
  const from = document.getElementById("activeDateFrom").value;
  const to = document.getElementById("activeDateTo").value;
  const terminal = document.getElementById("activeTerminalFilter").value.trim();
  const event = document.getElementById("activeEventFilter").value;

  let html = "";

  Object.keys(activeEvents).forEach(key => {

    const p = allParkomaty[key];
    if(!p) return;

    const id = p.id;

    const filtered = activeEvents[key].filter(e => {

      // ✅ bezpieczne parsowanie daty
      const raw = e.date;
      if(!raw) return false;

      const d = new Date(raw.replace(" ", "T"));

      // ✅ filtr OD
      if(from && d < new Date(from)) return false;

      // ✅ filtr DO (cały dzień!)
      if(to){
        const toDate = new Date(to);
        toDate.setHours(23,59,59,999);
        if(d > toDate) return false;
      }

      // ✅ filtr po numerze
      if(terminal && !id.includes(terminal)) return false;

      // ✅ filtr po typie zdarzenia
      if(event && e.name !== event) return false;

      // ✅ filtr po strefie
      if(node && p.node !== node) return false;

      return true;
    });

    if(filtered.length === 0) return;

    html += `
      <div class="terminal-box">
        <b>Parkomat ${id}</b><br>
        ${p.location}<br><br>
    `;

    
filtered.forEach(e => {
  html += `
    • <b>${e.hardware || "Inne"}</b> – ${e.name}<br>
    <small>${e.date}</small><br>
  `;

    });

    html += `</div>`;
  });

  document.getElementById("awarieList").innerHTML = html;
}

/* ===== HISTORIA ===== */
function renderHistoryList(){
  const node = document.getElementById("historyNodeFilter").value;
  const from=document.getElementById("historyDateFrom").value;
  const to=document.getElementById("historyDateTo").value;
  const terminal=document.getElementById("historyTerminalFilter").value.trim();
  const event=document.getElementById("historyEventFilter").value;

  let html="";

  
historyEvents.forEach(r=>{

  if(!r[0]) return;

  // ✅ NOWE – filtr po liście parkomatów
  
const key = makeKey(r[0], r[1]); // ✅ r[1] = structure


const p = allParkomaty[key];
if (!p) return;

if(node && p.node !== node) return;



  const d=new Date(r[3]);

  if(from && d<new Date(from)) return;
  if(to && d>new Date(to)) return;
  if(terminal && !r[0].includes(terminal)) return;
  if(event && r[5]!==event) return;

  html+=`
    <div class="terminal-box">
      <b>Parkomat ${r[0]}</b><br>
      
<div class="event-name">
  ${r[5]} (${r[7]||""})
</div>
      Od: ${r[3]}<br>
      Do: ${r[8]||""}
    </div>
  `;
});


  document.getElementById("historiaList").innerHTML=html;
}
/* ===== URZĄDZENIA ===== */
function renderDevicesList(){
  const node = document.getElementById("deviceNodeFilter").value;
  const search = document
    .getElementById("deviceSearch")
    .value
    .trim()
    .toLowerCase();

  let html = "";

  Object.values(allParkomaty)
    .sort((a,b)=>a.id.localeCompare(b.id))
    .forEach(p=>{

      const text = `
        ${p.id}
        ${p.location}
      `.toLowerCase();

      if(search && !text.includes(search)) return;
      if(node && p.node !== node) return;
      const key = makeKey(p.id, p.structure);

      const alarms = activeEvents[key]?.length || 0;

      html += `
        <div class="terminal-box">

          <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
          ">

            <div>
              <b>Parkomat ${p.id}</b><br>
              ${p.location}<br>

              <small style="color:#9ca3af;">
                Strefa: ${p.node || "-"}
              </small>
            </div>

            <div style="
              min-width:50px;
              text-align:center;
              padding:6px 10px;
              border-radius:10px;
              background:${alarms ? '#dc2626' : '#16a34a'};
              color:white;
              font-weight:bold;
            ">
              ${alarms}
            </div>

          </div>

        </div>
      `;
    });

  document.getElementById("devicesList").innerHTML = html;
}
  /* ===== STATYSTYKI ===== */
function showStats(){

  const totalDevices = Object.keys(allParkomaty).length;

  const devicesWithAlarms = Object.keys(activeEvents).length;

  let totalAlarms = 0;
  Object.values(activeEvents).forEach(arr=>{
    totalAlarms += arr.length;
  });

  alert(
`📊 STATYSTYKI

🖥️ Urządzenia: ${totalDevices}

⚠️ Parkomaty z awarią: ${devicesWithAlarms}

🔥 Wszystkie awarie: ${totalAlarms}`
  );
}
``

function renderAll(){
  renderMarkers();
  renderActiveList();
  renderHistoryList();
  renderDevicesList();
}

async function init(){
  await loadParkomaty();
  await loadActive();
  await loadHistory();

  populateActiveEventFilter();
  populateEventFilter();

  renderAll();
}

init();

// zamykanie po wyborze

setTimeout(()=>{
  const nodeFilter = document.getElementById("nodeFilter");

  if(nodeFilter){
    nodeFilter.addEventListener("change", ()=>{
      document.getElementById("mapFilterPanel").classList.remove("open");
    });
  }
}, 0);


// zamykanie po kliknięciu poza panel

document.addEventListener("click", (e)=>{
  const panel = document.getElementById("mapFilterPanel");
  const button = document.querySelector(".filter-toggle");

  if (!panel || !button) return;

  if (!panel.contains(e.target) && !button.contains(e.target)) {
    panel.classList.remove("open");
  }
});


</script>
