<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Monitoring Awarii Parkomatów</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height: 100vh; width: 70%; float:left; }
#sidebar {
  width:30%;
  height:100vh;
  float:right;
  overflow:auto;
  padding:10px;
  box-shadow:-3px 0 6px rgba(0,0,0,0.2);
  background:#f8f8f8;
}
.counter {
  position:absolute;
  top:10px;
  right:32%;
  background:white;
  padding:10px 15px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
  font-weight:bold;
  z-index:1000;
}
.section { margin-bottom:25px; }
input { margin:3px 0; width:100%; padding:4px; }
.awaria-item {
  background:white;
  padding:6px;
  margin:4px 0;
  border-left:4px solid orange;
}
.historia-item {
  background:white;
  padding:6px;
  margin:4px 0;
  border-left:4px solid gray;
}
</style>
</head>
<body>

<div id="map"></div>
<div class="counter" id="counter">Aktywne awarie: 0</div>

<div id="sidebar">

<h2>🔧 Aktywne awarie</h2>
<div id="aktywnelist"></div>

<hr/>

<h2>📜 Historia (usunięte)</h2>

<label>Filtr numer parkomatu</label>
<input type="text" id="filterTerminal" placeholder="np. 13070706">

<label>Od daty</label>
<input type="date" id="filterFrom">

<label>Do daty</label>
<input type="date" id="filterTo">

<button onclick="filterHistoria()">Filtruj</button>

<div id="historialist"></div>

</div>

<script>

const parkomatyUrl = "parkomaty.csv";
const aktywneUrl = "awarie_aktywne.csv";
const historiaUrl = "awarie_historia.csv";

let map = L.map('map').setView([52.23, 21.01], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = {};
let parkomaty = [];
let aktywne = [];
let historia = [];

function loadCSV(url) {
  return fetch(url)
    .then(r => r.text())
    .then(text => {
      const rows = text.split("\n").map(r => r.split(","));
      const headers = rows[0];
      return rows.slice(1).map(r => {
        let obj = {};
        headers.forEach((h,i)=>obj[h.trim()]=r[i]);
        return obj;
      });
    });
}

Promise.all([
  loadCSV(parkomatyUrl),
  loadCSV(aktywneUrl),
  loadCSV(historiaUrl)
]).then(data => {
  parkomaty = data[0];
  aktywne = data[1];
  historia = data[2];

  renderMap();
  renderActiveList();
  renderHistoriaList();
  updateCounter();
});

function renderMap() {

  parkomaty.forEach(p => {

    const terminal = p.TerminalID;
    const awarie = aktywne.filter(a => a.TerminalID === terminal);

    const color = awarie.length > 0 ? "orange" : "green";

    const marker = L.circleMarker(
      [parseFloat(p.Lat), parseFloat(p.Lng)],
      { radius:8, color:color }
    ).addTo(map);

    let popup = `
      <b>Terminal:</b> ${terminal}<br/>
      <b>Adres:</b> ${p.Adres}<br/>
      <b>Ilość aktywnych awarii:</b> ${awarie.length}
    `;

    if (awarie.length > 0) {
      popup += "<br/><b>Lista:</b><ul>";
      awarie.forEach(a=>{
        popup += `<li>${a.EventCodeName} (${a.ExternalEventCodeID})</li>`;
      });
      popup += "</ul>";
    }

    marker.bindPopup(popup);
    markers[terminal] = marker;
  });

}

function updateCounter() {
  document.getElementById("counter").innerText =
    "Aktywne awarie: " + aktywne.length;
}

function renderActiveList() {
  const div = document.getElementById("aktywnelist");
  div.innerHTML = "";

  aktywne.forEach(a=>{
    div.innerHTML += `
      <div class="awaria-item">
        <b>${a.TerminalID}</b><br/>
        ${a.EventCodeName}<br/>
        ${a.EventDateUtc}
      </div>
    `;
  });
}

function renderHistoriaList(filtered = historia) {
  const div = document.getElementById("historialist");
  div.innerHTML = "";

  filtered.forEach(h=>{
    div.innerHTML += `
      <div class="historia-item">
        <b>${h.TerminalID}</b><br/>
        ${h.EventCodeName}<br/>
        ${h.EventDateUtc}
      </div>
    `;
  });
}

function filterHistoria() {

  const terminal = document.getElementById("filterTerminal").value;
  const from = document.getElementById("filterFrom").value;
  const to = document.getElementById("filterTo").value;

  let filtered = historia.filter(h=>{

    let ok = true;

    if (terminal && h.TerminalID !== terminal) ok = false;

    if (from && new Date(h.EventDateUtc) < new Date(from)) ok = false;

    if (to && new Date(h.EventDateUtc) > new Date(to)) ok = false;

    return ok;
  });

  renderHistoriaList(filtered);
}

</script>
</body>
</html>
