<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Parkomatów</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
  padding-bottom:65px;
}

header {
  background:#1e293b;
  color:white;
  padding:15px;
  text-align:center;
  position:relative;
}

#alarmCounter {
  position:absolute;
  right:15px;
  top:15px;
  background:red;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-weight:bold;
}

#map {
  height:calc(100vh - 130px);
}

.section {
  display:none;
  padding:12px;
}

.active-section {
  display:block;
}

.bottom-nav {
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  display:flex;
  background:white;
  border-top:1px solid #ccc;
  z-index:1000;
}

.bottom-nav button {
  flex:1;
  border:none;
  background:white;
  font-size:15px;
  font-weight:600;
}

.terminal-box {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.event-row {
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-top:1px solid #eee;
  padding:6px 0;
}

.event-name {
  flex:1;
  word-break:break-word;
}

.event-time {
  white-space:nowrap;
}

.leaflet-popup-content {
  white-space:normal !important;
  word-break:break-word;
}
</style>
</head>

<body>

<header>
Monitoring Parkomatów
<div id="alarmCounter">0</div>
</header>

<div id="map" class="active-section"></div>
<div id="awarie" class="section"><div id="awarieList"></div></div>
<div id="historia" class="section"><div id="historiaList"></div></div>

<div class="bottom-nav">
<button onclick="showSection('map')">MAPA</button>
<button onclick="showSection('awarie')">AWARIE</button>
<button onclick="showSection('historia')">HISTORIA</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🔹 LINKI DO CSV
const PARKOMATY_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vReREVijVR33ZVud78Iv_oHBEkmDRkQxRxL97KN8gIbs9u5YPtVtvYsaQmHxrf7JWz_pQ_KdCaixonO/pub?output=csv";

const ACTIVE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=0&single=true&output=csv";

const HISTORY_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=1220391858&single=true&output=csv";

/* =======================
   MAPA
======================= */

let map = L.map('map').setView([53.484,18.753],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let allParkomaty = {};
let activeEvents = {};
let markers = [];

/* =======================
   CSV PARSER (bez rozjazdów)
======================= */

function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/);

  for(let line of lines){
    if(!line.trim()) continue;

    const values = [];
    let current = '';
    let inQuotes = false;

    for(let i=0;i<line.length;i++){
      const char = line[i];

      if(char === '"'){
        inQuotes = !inQuotes;
      }
      else if(char === ',' && !inQuotes){
        values.push(current);
        current = '';
      }
      else{
        current += char;
      }
    }
    values.push(current);
    rows.push(values.map(v => v.replace(/^"|"$/g,'')));
  }

  return rows;
}

/* =======================
   Wczytaj Parkomaty
======================= */

async function loadParkomaty(){
  const res = await fetch(PARKOMATY_URL);
  const text = await res.text();
  const rows = parseCSV(text).slice(1);

  rows.forEach(r=>{
    const id = r[0]?.trim();
    const location = r[1];
    const lng = parseFloat(r[2]);
    const lat = parseFloat(r[3]);

    if(id && !isNaN(lat) && !isNaN(lng)){
      allParkomaty[id] = {lat,lng,location};
    }
  });
}

/* =======================
   Wczytaj Aktywne
======================= */

async function loadActive(){
  const res = await fetch(ACTIVE_URL);
  const text = await res.text();
  const rows = parseCSV(text).slice(1);

  activeEvents = {};

  rows.forEach(r=>{
    const id = r[0];
    const date = r[3];
    const event = r[4];
    const hardware = r[6];

    if(!id) return;

    if(!activeEvents[id]) activeEvents[id]=[];

    activeEvents[id].push({
      name: `${event} - ${hardware || ""}`.trim(),
      date: date
    });
  });

  document.getElementById("alarmCounter").innerText =
    Object.values(activeEvents).reduce((sum,a)=>sum+a.length,0);

  renderMap();
  renderActiveList();
}

/* =======================
   Wczytaj Historia
======================= */

async function loadHistory(){
  const res = await fetch(HISTORY_URL);
  const text = await res.text();
  const rows = parseCSV(text).slice(1);

  let html = "";

  rows.forEach(r=>{
    const id = r[0];
    const start = r[3];
    const end = r[7];
    const event = r[4];
    const hardware = r[6];

    html += `
      <div class="terminal-box">
        <b>Parkomat ${id}</b><br>
        ${event} - ${hardware || ""}<br>
        Od: ${start}<br>
        Do: ${end}
      </div>
    `;
  });

  document.getElementById("historiaList").innerHTML = html;
}

/* =======================
   MAPA
======================= */

function renderMap(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  Object.keys(activeEvents).forEach(id=>{
    if(!allParkomaty[id]) return;

    const p = allParkomaty[id];
    let popup = `<b>Parkomat ${id}</b><br><br>`;

    activeEvents[id].forEach(e=>{
      popup += `
        <div style="margin-bottom:6px;">
          • ${e.name}<br>
          <b>Data:</b> ${e.date}
        </div>
      `;
    });

    const marker = L.marker([p.lat,p.lng]).addTo(map).bindPopup(popup);
    markers.push(marker);
  });
}

/* =======================
   Lista aktywnych
======================= */

function renderActiveList(){
  let html="";

  Object.keys(activeEvents).forEach(id=>{
    html+=`<div class="terminal-box">
      <b>Parkomat ${id}</b><br>
      Ilość awarii: ${activeEvents[id].length}
    `;

    activeEvents[id].forEach(e=>{
      html+=`
        <div class="event-row">
          <div class="event-name">${e.name}</div>
          <div class="event-time">${e.date}</div>
        </div>
      `;
    });

    html+="</div>";
  });

  document.getElementById("awarieList").innerHTML=html;
}

/* =======================
   ZAKŁADKI
======================= */

function showSection(id){
  document.getElementById("map").classList.remove("active-section");
  document.getElementById("awarie").classList.remove("active-section");
  document.getElementById("historia").classList.remove("active-section");

  document.getElementById(id).classList.add("active-section");

  if(id==="map"){
    setTimeout(()=>map.invalidateSize(),200);
  }
}

/* =======================
   INIT
======================= */

async function init(){
  await loadParkomaty();
  await loadActive();
  await loadHistory();
}

init();

</script>

</body>
</html>
