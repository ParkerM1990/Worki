<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Parkomatów</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
header{height:60px;background:#1e293b;color:white;display:flex;align-items:center;justify-content:center;position:relative;}
#alarmCounter{position:absolute;right:15px;background:red;padding:4px 10px;border-radius:20px;}
.main{position:fixed;top:60px;bottom:60px;left:0;right:0;overflow:hidden;}
.section{position:absolute;inset:0;display:none;overflow:auto;}
.section.active{display:block;}
#map { width:100%; height:100%; z-index:1;}
.bottom-nav{position:fixed;bottom:0;height:60px;width:100%;display:flex;background:white;border-top:1px solid #ccc;}
.bottom-nav button{flex:1;border:none;background:white;font-size:15px;font-weight:600;}
.terminal-box{background:white;margin:12px;padding:12px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
.leaflet-popup-content{width:260px !important;max-width:260px !important;word-break:break-word;}
</style>
</head>

<body>

<header>
Monitoring Parkomatów
<div id="alarmCounter">0</div>
</header>

<div class="main">

  <!-- MAPA -->
  <div id="mapSection" class="section active">
    <div style="position:absolute;z-index:1000;background:white;padding:8px;margin:10px;border-radius:8px;">
      <select id="nodeFilter" onchange="renderMarkers()">
        <option value="">Wszystkie strefy</option>
      </select>
    </div>
    <div id="map"></div>
  </div>

  <!-- AWARIE -->
  <div id="awarieSection" class="section">
    <div style="padding:10px;">
      <label>Data od:</label>
      <input type="date" id="awarieDateFrom" onchange="loadActive()">
    </div>
    <div id="awarieList"></div>
  </div>

  <!-- HISTORIA -->
  <div id="historiaSection" class="section">
    <div style="padding:10px;">
      <label>Data od:</label>
      <input type="date" id="historiaDateFrom" onchange="loadHistory()">
    </div>
    <div id="historiaList"></div>
  </div>

</div>

<div class="bottom-nav">
  <button onclick="showSection('mapSection')">MAPA</button>
  <button onclick="showSection('awarieSection')">AWARIE</button>
  <button onclick="showSection('historiaSection')">HISTORIA</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// LINKI CSV
const PARKOMATY_URL="TU_WKLEJ_LINK_DO_PARKOMATOW";
const ACTIVE_URL="TU_WKLEJ_LINK_DO_AKTYWNYCH";
const HISTORY_URL="TU_WKLEJ_LINK_DO_HISTORII";

// MAPA – Warszawa
let map = L.map('map').setView([52.2297, 21.0122], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];
let allParkomaty={};
let activeEvents={};

// Zakładki
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="mapSection"){
    setTimeout(()=>{ map.invalidateSize(); renderMarkers(); },200);
  }
}

// CSV parser
function parseCSV(text){
  const rows=[];
  const lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
  for(let line of lines){
    if(!line.trim()) continue;
    rows.push(line.split(",").map(v=>v.replace(/^"|"$/g,"").trim()));
  }
  return rows;
}

// PARKOMATY
async function loadParkomaty(){
  const res=await fetch(PARKOMATY_URL);
  const text=await res.text();
  const rows=parseCSV(text).slice(1);

  let nodeSet=new Set();

  rows.forEach(r=>{
    if(r.length<5) return;

    const id=r[0];
    const lng=parseFloat(r[2]);
    const lat=parseFloat(r[3]);
    const node=r[4] || "";

    if(!id || isNaN(lat) || isNaN(lng)) return;

    allParkomaty[id]={lat,lng,location:r[1],node};
    if(node) nodeSet.add(node);
  });

  const select=document.getElementById("nodeFilter");
  nodeSet.forEach(n=>{
    const opt=document.createElement("option");
    opt.value=n;
    opt.textContent=n;
    select.appendChild(opt);
  });
}

// AKTYWNE AWARIE
async function loadActive(){
  const res=await fetch(ACTIVE_URL);
  const text=await res.text();
  const rows=parseCSV(text).slice(1);

  activeEvents={};
  let html="";
  let count=0;

  const dateFrom=document.getElementById("awarieDateFrom").value;

  rows.forEach(r=>{
    if(!r[0]) return;

    const eventDate=r[3]?.substring(0,10);
    if(dateFrom && eventDate < dateFrom) return;

    const id=r[0];
    if(!activeEvents[id]) activeEvents[id]=[];

    activeEvents[id].push({
      name:r[4],
      hardware:r[6]||"",
      date:eventDate
    });

    count++;
  });

  Object.keys(activeEvents).forEach(id=>{
    html+=`<div class="terminal-box"><b>Parkomat ${id}</b><br>`;
    activeEvents[id].forEach(e=>{
      html+=`• ${e.name} (${e.hardware}) - ${e.date}<br>`;
    });
    html+="</div>";
  });

  document.getElementById("awarieList").innerHTML=html;
  document.getElementById("alarmCounter").innerText=count;

  renderMarkers();
}

// HISTORIA
async function loadHistory(){
  const res=await fetch(HISTORY_URL);
  const text=await res.text();
  const rows=parseCSV(text).slice(1);

  const dateFrom=document.getElementById("historiaDateFrom").value;
  let html="";

  rows.forEach(r=>{
    if(!r[0]) return;

    const startDate=r[3]?.substring(0,10);
    if(dateFrom && startDate < dateFrom) return;

    html+=`<div class="terminal-box"><b>Parkomat ${r[0]}</b><br>`;
    html+=`Od: ${startDate}<br>Do: ${r[7]?.substring(0,10) || ""}<br>`;
    html+=`${r[4]} (${r[6]||""})<br></div>`;
  });

  document.getElementById("historiaList").innerHTML=html;
}

// MARKERY
function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const selectedNode=document.getElementById("nodeFilter").value;

  Object.keys(activeEvents).forEach(id=>{
    const p=allParkomaty[id];
    if(!p) return;
    if(selectedNode && p.node!==selectedNode) return;

    let popup=`<b>Parkomat ${id}</b><br>${p.location}<br>Strefa: ${p.node}<br>`;
    activeEvents[id].forEach(e=>{
      popup+=`• ${e.name} (${e.hardware}) - ${e.date}<br>`;
    });

    const m=L.marker([p.lat,p.lng]).addTo(map).bindPopup(popup);
    markers.push(m);
  });
}

// INIT
async function init(){
  await loadParkomaty();
  await loadActive();
  await loadHistory();
}

init();

</script>
</body>
</html>
