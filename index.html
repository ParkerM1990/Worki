
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Parkomatów</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#e5e7eb;
}


header{
  height:60px;
  background:#020617;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between; /* ✅ */
  padding:0 10px;
  position:relative;
}

.header-left{
  font-weight:600;
}

.header-right{
  display:flex;
  align-items:center;
  gap:8px;
}



#alarmCounter{
  background:#dc2626;
  padding:4px 10px;
  border-radius:20px;
}


.main{
  position:fixed;
  top:60px;
  bottom:60px;
  left:0;
  right:0;
  overflow:hidden;
}

.section{
  position:absolute;
  inset:0;
  display:none;
  overflow:auto;
  padding-bottom:20px;
}

.section.active{
  display:block;
}

/* 🔘 przycisk */

.filter-toggle{
  background:#020617;
  color:white;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:8px 10px;
  font-size:14px;
}


/* 📦 panel */
.map-filter-panel{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  background:#020617;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:10px;
  display:grid;
  gap:10px;

  /* ✅ animacja */
  max-height:0;
  overflow:hidden;
  opacity:0;
  transform:translateY(-10px);
  transition:0.3s ease;
  z-index:1000;
}

/* ✅ stan otwarty */
.map-filter-panel.open{
  max-height:200px;
  opacity:1;
  transform:translateY(0)
}

#map{
  width:100%;
  height:100%;
}

#map{
  z-index:0;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  height:60px;
  width:100%;
  display:flex;
  background:#020617;
  border-top:1px solid #1f2937;
}

.bottom-nav button{
  flex:1;
  border:none;
  background:none;
  color:#e5e7eb;
  font-weight:600;
}

/* ✅ NOWY MOBILNY PANEL FILTRÓW */
.filter-bar.mobile{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:8px;
  padding:10px;
  background:#020617;
  border-bottom:1px solid #1f2937;
  position:sticky;
  top:0;
  z-index:10;
}

.filter-item{
  display:flex;
  align-items:center;
  background:#020617;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:6px 8px;
}

.map-filter-wrapper{
  position:relative;
}

.filter-item span{
  font-size:14px;
  margin-right:6px;
}

.filter-item input,
.filter-item select{
  flex:1;
  background:transparent;
  border:none;
  color:white;
  font-size:14px;
  outline:none;
}

select,input{
  font-size:14px;
}

.terminal-box{
  background:#0b1220;
  margin:12px;
  padding:12px;
  border-radius:10px;
  border:1px solid #1f2937;
}

.leaflet-popup-content{
  width:280px !important;
  word-break:break-word;
}
</style>
</head>

<body>


<header>

  <div class="header-left">
    Monitoring Parkomatów
  </div>

  <div class="header-right">
    <button class="filter-toggle" onclick="toggleFilters()">
      ⚙️
    </button>
    <div id="alarmCounter">0</div>
  </div>


<div class="main">

<!-- MAPA -->
<div id="mapSection" class="section active">
  
<div class="map-filter-wrapper">
  <div id="mapFilterPanel" class="map-filter-panel">

    <div class="filter-item">
      <span>📍</span>
      <select id="nodeFilter" onchange="renderAll()">
        <option value="">Wszystkie strefy</option>
      </select>
    </div>

  </div>

</div>

  <div id="map"></div>
</div>

<!-- AWARIE -->
<div id="awarieSection" class="section">

  <div class="filter-bar mobile">

    <div class="filter-item">
      <span>📅</span>
      <input type="date" id="activeDateFrom" onchange="renderActiveList()">
    </div>

    <div class="filter-item">
      <span>➡️</span>
      <input type="date" id="activeDateTo" onchange="renderActiveList()">
    </div>

    <div class="filter-item">
      <span>🔎</span>
      <input type="text" id="activeTerminalFilter" placeholder="Nr parkomatu" oninput="renderActiveList()">
    </div>

    <div class="filter-item">
      <span>⚠️</span>
      <select id="activeEventFilter" onchange="renderActiveList()"></select>
    </div>

  </div>

  <div id="awarieList"></div>
</div>

<!-- HISTORIA -->
<div id="historiaSection" class="section">

  <div class="filter-bar mobile">

    <div class="filter-item">
      <span>📅</span>
      <input type="date" id="historyDateFrom" onchange="renderHistoryList()">
    </div>

    <div class="filter-item">
      <span>➡️</span>
      <input type="date" id="historyDateTo" onchange="renderHistoryList()">
    </div>

    <div class="filter-item">
      <span>🔎</span>
      <input type="text" id="historyTerminalFilter" placeholder="Nr parkomatu" oninput="renderHistoryList()">
    </div>

    <div class="filter-item">
      <span>📜</span>
      <select id="historyEventFilter" onchange="renderHistoryList()"></select>
    </div>

  </div>

  <div id="historiaList"></div>
</div>

</div>

<div class="bottom-nav">
  <button onclick="showSection('mapSection')">MAPA</button>
  <button onclick="showSection('awarieSection')">AWARIE</button>
  <button onclick="showSection('historiaSection')">HISTORIA</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ✅ JS zostaje praktycznie bez zmian -->
<script>

function toggleFilters(){
  const panel = document.getElementById("mapFilterPanel");
  panel.classList.toggle("open");
}

/* ===== SHEETS ===== */
const PARKOMATY_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vReREVijVR33ZVud78Iv_oHBEkmDRkQxRxL97KN8gIbs9u5YPtVtvYsaQmHxrf7JWz_pQ_KdCaixonO/pub?output=csv";
const ACTIVE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=0&single=true&output=csv";
const HISTORY_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9Z5qWrmqdo88LUJtOcJsUkaNZEhxfsXTucOKWI2hbwtUKdGwdvQn4JsR7Wj27TJwxW7H0jnODbfR/pub?gid=1220391858&single=true&output=csv";

/* ===== MAPA ===== */
let map = L.map('map').setView([52.2297,21.0122],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
let markerLayer = L.layerGroup().addTo(map);

/* ===== DATA ===== */
let allParkomaty={};
let activeEvents={};
let historyEvents=[];
const RED_CODES = ["16384","16385","16386","16900"];
/* ===== CSV ===== */
function parseCSV(text){
  const rows=[];
  const lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
  for(let line of lines){
    if(!line.trim()) continue;
    rows.push(line.split(",").map(v=>v.replace(/^"|"$/g,"")));
  }
  return rows;
}


/* ===== LOAD PARKOMATY ===== */
async function loadParkomaty(){
  const rows=parseCSV(await (await fetch(PARKOMATY_URL)).text()).slice(1);

  const nodeSet=new Set();

  rows.forEach(r=>{
    const id=r[0]?.trim();
    const lng=parseFloat(r[2]);
    const lat=parseFloat(r[3]);
    const node=r[4];

    if(!id || isNaN(lat) || isNaN(lng)) return;

    allParkomaty[id]={lat,lng,location:r[1],node};
    nodeSet.add(node);
  });

  document.getElementById("nodeFilter").innerHTML=
    `<option value="">Wszystkie strefy</option>`+
    [...nodeSet].sort().map(n=>`<option>${n}</option>`).join('');
}

/* ===== LOAD ACTIVE ===== */
async function loadActive(){
  const rows=parseCSV(await (await fetch(ACTIVE_URL)).text()).slice(1);

  activeEvents={};
  let count=0;

  rows.forEach(r=>{
    const id=r[0]?.trim();
    if(!id) return;

    if(!activeEvents[id]) activeEvents[id]=[];

    
activeEvents[id].push({
  name:r[5],
  code:r[4],   // ✅ DODANE (eventCode)
  hardware:r[7]||"",
  date:r[3]
});


    count++;
  });

  document.getElementById("alarmCounter").innerText=count;
}

/* ===== LOAD HISTORY ===== */
async function loadHistory(){
  historyEvents=parseCSV(await (await fetch(HISTORY_URL)).text()).slice(1);
}

/* ===== UI ===== */
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="mapSection") setTimeout(()=>map.invalidateSize(),200);
}

/* ===== MAP + AUTO CENTER ===== */
function renderMarkers(){

  const node=document.getElementById("nodeFilter").value;
  markerLayer.clearLayers();

  let points=[];

 
Object.keys(activeEvents).forEach(id=>{
  const p=allParkomaty[id];
  if(!p) return;

  if(node && p.node!==node) return;

  let popup=`<b>Parkomat ${id}</b><br>${p.location}<br><br>`;

  activeEvents[id].forEach(e=>{
    popup+=`• ${e.name}<br><small>${e.date}</small><br>`;
  });

  popup+=`
    <br>
    <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}"
       target="_blank"
       style="background:#16a34a;color:white;padding:6px 10px;border-radius:6px;text-decoration:none;">
       🧭 Nawiguj
    </a>
  `;

  // ✅ 👉 DODAJ TO TU
  const codes = activeEvents[id].map(e => (e.code ? String(e.code).trim() : ""));
  const hasCritical = codes.some(code => RED_CODES.includes(code));

  // ✅ marker
  const icon = L.divIcon({
    className: '',
    html: `
      <div style="
        width:22px;
        height:22px;
        border-radius:50%;
        background:${hasCritical ? '#dc2626' : '#16a34a'};
        border:2px solid white;
        box-shadow:0 0 8px rgba(0,0,0,0.6);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:12px;
        color:white;
        font-weight:bold;
      ">
        ${activeEvents[id].length}
      </div>
    `
  });

  L.marker([p.lat,p.lng], { icon })
    .bindPopup(popup)
    .addTo(markerLayer);

  points.push([p.lat,p.lng]);
});


  if(points.length===0){
    map.setView([52.2297,21.0122],6);
  }
  else if(points.length===1){
    map.setView(points[0],15);
  }
  else{
    map.fitBounds(L.latLngBounds(points),{
      padding:[50,50],
      maxZoom:16
    });
  }
}

/* ===== FILTR AWARII (RESTORED) ===== */
function populateActiveEventFilter(){

  const set=new Set();

  Object.values(activeEvents).forEach(arr=>{
    arr.forEach(e=>{
      if(e.name) set.add(e.name);
    });
  });

  document.getElementById("activeEventFilter").innerHTML=
    `<option value="">Wszystkie awarie</option>`+
    [...set].sort().map(e=>`<option value="${e}">${e}</option>`).join('');
}

/* ===== FILTR HISTORII (RESTORED) ===== */
function populateEventFilter(){

  const set=new Set();

  historyEvents.forEach(r=>{
    if(r[4]) set.add(r[4]);
  });

  document.getElementById("historyEventFilter").innerHTML=
    `<option value="">Wszystkie awarie</option>`+
    [...set].sort().map(e=>`<option value="${e}">${e}</option>`).join('');
}

/* ===== AWARIE ===== */
function renderActiveList(){

  const from=document.getElementById("activeDateFrom").value;
  const to=document.getElementById("activeDateTo").value;
  const terminal=document.getElementById("activeTerminalFilter").value.trim();
  const event=document.getElementById("activeEventFilter").value;

  let html="";

  Object.keys(activeEvents).forEach(id=>{
    const p=allParkomaty[id];
    if(!p) return;

    const filtered=activeEvents[id].filter(e=>{
      const d=new Date(e.date);

      if(from && d<new Date(from)) return false;
      if(to && d>new Date(to)) return false;
      if(terminal && !id.includes(terminal)) return false;
      if(event && e.name!==event) return false;

      return true;
    });

    if(filtered.length===0) return;

    html+=`<div class="terminal-box"><b>Parkomat ${id}</b><br>${p.location}<br><br>`;

    filtered.forEach(e=>{
      html+=`• ${e.name}<br><small>${e.date}</small><br>`;
    });

    html+=`</div>`;
  });

  document.getElementById("awarieList").innerHTML=html;
}

/* ===== HISTORIA ===== */
function renderHistoryList(){

  const from=document.getElementById("historyDateFrom").value;
  const to=document.getElementById("historyDateTo").value;
  const terminal=document.getElementById("historyTerminalFilter").value.trim();
  const event=document.getElementById("historyEventFilter").value;

  let html="";

  historyEvents.forEach(r=>{

    if(!r[0]) return;

    const d=new Date(r[3]);

    if(from && d<new Date(from)) return;
    if(to && d>new Date(to)) return;
    if(terminal && !r[0].includes(terminal)) return;
    if(event && r[4]!==event) return;

    html+=`
      <div class="terminal-box">
        <b>Parkomat ${r[0]}</b><br>
        ${r[5]} (${r[6]||""})<br>
        Od: ${r[3]}<br>
        Do: ${r[8]||""}
      </div>
    `;
  });

  document.getElementById("historiaList").innerHTML=html;
}

/* ===== MASTER ===== */
function renderAll(){
  renderMarkers();
  renderActiveList();
  renderHistoryList();
}

/* ===== INIT ===== */
async function init(){
  await loadParkomaty();
  await loadActive();
  await loadHistory();

  populateActiveEventFilter();
  populateEventFilter();

  renderAll();
}

init();

// zamykanie po wyborze

setTimeout(()=>{
  const nodeFilter = document.getElementById("nodeFilter");

  if(nodeFilter){
    nodeFilter.addEventListener("change", ()=>{
      document.getElementById("mapFilterPanel").classList.remove("open");
    });
  }
}, 0);


// zamykanie po kliknięciu poza panel

document.addEventListener("click", (e)=>{
  const panel = document.getElementById("mapFilterPanel");
  const button = document.querySelector(".filter-toggle");

  if (!panel || !button) return;

  if (!panel.contains(e.target) && !button.contains(e.target)) {
    panel.classList.remove("open");
  }
});


</script>

</body>
</html>
